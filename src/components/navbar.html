    <nav class="flex items-center justify-between h-16" role="navigation" aria-label="Main navigation">
      <a href="index.html" class="flex items-center">
        <img src="assets/img/logo-lg.png" alt="OWASP BLT Logo" class="h-8 w-auto">
      </a>
      <ul class="hidden md:flex items-center gap-1 list-none m-0 p-0">
        <li><a href="index.html" data-page="index" class="nav-link px-3 py-2 text-sm font-medium rounded-md transition-colors">Home</a></li>
        <li><a href="pages/report-bug.html" data-page="report-bug" class="nav-link whitespace-nowrap px-3 py-2 text-sm font-medium rounded-md transition-colors">Report Bug</a></li>
        <li><a href="pages/leaderboard.html" data-page="leaderboard" class="nav-link px-3 py-2 text-sm font-medium rounded-md transition-colors">Leaderboard</a></li>
        <li><a href="pages/projects.html" data-page="projects" class="nav-link px-3 py-2 text-sm font-medium rounded-md transition-colors">Projects</a></li>
        <li><a href="pages/about.html" data-page="about" class="nav-link px-3 py-2 text-sm font-medium rounded-md transition-colors">About</a></li>
      </ul>
      <div class="hidden md:flex items-center gap-2">
        <button id="themeToggle" class="p-2 text-gray-500 dark:text-gray-400 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors" aria-label="Toggle theme">
          <i class="fa-solid fa-sun dark:hidden text-sm" aria-hidden="true"></i>
          <i class="fa-solid fa-moon hidden dark:block text-sm" aria-hidden="true"></i>
        </button>
        <a href="pages/login.html" class="px-4 py-2 text-sm font-medium text-red-600 dark:text-red-400 border border-red-600 dark:border-red-400 rounded-md hover:bg-red-600 hover:text-white transition-colors">Login</a>
        <a href="pages/signup.html" class="px-4 py-2 text-sm font-medium text-white bg-red-600 rounded-md hover:bg-red-700 transition-colors">Sign Up</a>
      </div>
      <button class="md:hidden p-2 text-gray-600 dark:text-gray-300 rounded-md hover:bg-gray-100 dark:hover:bg-gray-800" id="mobileMenuBtn" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">
        <i class="fa-solid fa-bars text-base" aria-hidden="true"></i>
      </button>
    </nav>
    <div id="mobileMenu" class="hidden md:hidden fixed top-16 left-0 w-full h-[calc(100vh-4rem)] z-40 px-4 pb-4 border-t border-[#E5E5E5] dark:border-gray-800 dark:bg-gray-900 overflow-y-auto">
      <ul class="flex flex-col gap-1 pt-3 list-none m-0 p-0">
        <li><a href="index.html" data-page="index" class="nav-link-mobile block px-3 py-2 text-sm font-medium rounded-md transition-colors">Home</a></li>
        <li><a href="pages/report-bug.html" data-page="report-bug" class="nav-link-mobile block whitespace-nowrap px-3 py-2 text-sm font-medium rounded-md transition-colors">Report Bug</a></li>

      </ul>
      <div class="flex gap-3 mt-3">
        <a href="pages/login.html" class="flex-1 px-4 py-2 text-sm font-medium text-center text-red-600 dark:text-red-400 border border-red-600 dark:border-red-400 rounded-md hover:bg-red-600 hover:text-white transition-colors">Login</a>
        <a href="pages/signup.html" class="flex-1 px-4 py-2 text-sm font-medium text-center text-white bg-red-600 rounded-md hover:bg-red-700 transition-colors">Sign Up</a>
      </div>
    </div>
  </div>
</header>

<script>
  (function() {
    const path = window.location.pathname;
    const page = path.split('/').pop().replace('.html', '') || 'index';
    
    const activeClasses = 'text-red-600 dark:text-red-400 rounded-md bg-red-50 dark:bg-gray-800';
    const inactiveClasses = 'text-gray-600 dark:text-gray-300 hover:text-red-600 dark:hover:text-red-400 hover:bg-red-50 dark:hover:bg-gray-800';
    
    document.querySelectorAll('.nav-link').forEach(link => {
      const linkPage = link.getAttribute('data-page');
      if (linkPage === page) {
        link.classList.add(...activeClasses.split(' '));
      } else {
        link.classList.add(...inactiveClasses.split(' '));
      }
    });
    
    document.querySelectorAll('.nav-link-mobile').forEach(link => {
      const linkPage = link.getAttribute('data-page');
      if (linkPage === page) {
        link.classList.add(...activeClasses.split(' '));
      } else {
        link.classList.add(...inactiveClasses.split(' '));
      }
    });

    const mobileMenuBtn = document.getElementById('mobileMenuBtn');
    const mobileMenu = document.getElementById('mobileMenu');
    if (mobileMenuBtn && mobileMenu) {
      mobileMenuBtn.addEventListener('click', () => {
        const isHidden = mobileMenu.classList.toggle('hidden');
        const isExpanded = !isHidden;
        mobileMenuBtn.setAttribute('aria-expanded', isExpanded ? 'true' : 'false');
        mobileMenu.setAttribute('aria-hidden', isExpanded ? 'false' : 'true');
      });
    }
  })();
</script>
